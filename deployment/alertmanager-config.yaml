cat <<EOF | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: default
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: ''
    route:
      receiver: slack-notifications
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            icon_emoji: ':bell:'
            username: 'Alertmanager'
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: '{{ if eq .Status "firing" }}🔥 {{ .CommonAnnotations.summary }}{{ else }}✅ RESOLVED: {{ .CommonAnnotations.summary }}{{ end }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace | default "N/A" }}
              *Pod:* {{ .Labels.pod | default "N/A" }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'namespace']
EOF
