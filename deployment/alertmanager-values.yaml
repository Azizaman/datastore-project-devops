alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/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'
    route:
      receiver: slack-notifications
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            icon_emoji: ':bell:'
            username: 'Alertmanager'
            title: '{{ if eq .Status "firing" }}🔥 {{ .CommonLabels.alertname }}{{ else }}✅ RESOLVED{{ end }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace | default "N/A" }}
              *Description:* {{ .Annotations.description | default "No description" }}
              {{ end }}
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['alertname', 'namespace']
