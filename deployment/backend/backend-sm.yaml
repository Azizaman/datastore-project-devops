apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: default   # 🔥 same as prometheus
  labels:
    release: monitoring   # 🔥 must match helm install name
spec:
  selector:
    matchLabels:
      type: backend   # matches your service label
  namespaceSelector:
    matchNames:
      - backend   # 🔥 your app namespace
  endpoints:
    - port: http   # must match service port name
      path: /actuator/prometheus
      interval: 15s
